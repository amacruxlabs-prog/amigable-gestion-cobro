version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: amigable-cobro-api
    container_name: amigable-cobro-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - amigable-network
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000

  db:
    image: mysql:8.0
    container_name: amigable-cobro-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-amigable_cobro}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - amigable-network
    ports:
      - "3312:3306"

networks:
  amigable-network:
    driver: bridge

volumes:
  db-data:
    driver: local
