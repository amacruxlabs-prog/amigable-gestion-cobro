<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amigable Cobro — API | Documentación Interactiva</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #0f172a; }
    .topbar-wrapper .link { display: flex; align-items: center; }
    .topbar-wrapper .link img { height: 32px; }
    .swagger-ui .topbar { background: #1e293b; border-bottom: 1px solid #334155; }
    .swagger-ui .info .title { color: #f1f5f9; }
    .swagger-ui .info { margin: 30px 0; }
    .swagger-ui .info p, .swagger-ui .info li, .swagger-ui .info table { color: #cbd5e1; }
    .swagger-ui .scheme-container { background: #1e293b; box-shadow: none; border: 1px solid #334155; border-radius: 8px; padding: 15px; }
    .swagger-ui .opblock-tag { color: #f1f5f9; border-bottom: 1px solid #334155; }
    .swagger-ui .opblock-tag:hover { background: #1e293b; }
    .swagger-ui .opblock .opblock-summary-description { color: #94a3b8; }
    .swagger-ui .opblock-summary-method { border-radius: 4px; }
    .swagger-ui .opblock-body { background: #0f172a; }
    .swagger-ui .opblock-body pre { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; }
    .swagger-ui .opblock-body .btn { border-radius: 6px; }
    .swagger-ui table thead tr td, .swagger-ui table thead tr th { border-bottom: 1px solid #334155; color: #94a3b8; }
    .swagger-ui .parameter__name, .swagger-ui .parameter__type, .swagger-ui .prop-name, .swagger-ui .prop-type { color: #cbd5e1; }
    .swagger-ui .model-box { background: #1e293b; border: 1px solid #334155; border-radius: 6px; }
    .swagger-ui .model-title { color: #f1f5f9; }
    .swagger-ui .model { color: #e2e8f0; }
    .swagger-ui .model .property { color: #94a3b8; }
    .swagger-ui section.models { border: 1px solid #334155; border-radius: 8px; }
    .swagger-ui section.models.is-open h4 { border-bottom: 1px solid #334155; }
    .swagger-ui .response-col_status, .swagger-ui .response-col_description, .swagger-ui .response-col_links { color: #cbd5e1; }
    .swagger-ui .markdown p, .swagger-ui .markdown li { color: #cbd5e1; }
    .swagger-ui .btn.authorize { border-color: #38bdf8; color: #38bdf8; }
    .swagger-ui .btn.authorize:hover { background-color: rgba(56, 189, 248, 0.1); }
    .swagger-ui .auth-btn-wrapper .btn-done { border-color: #4ade80; color: #4ade80; }
    .swagger-ui .auth-container input[type=text] { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; }
    .swagger-ui .auth-container label { color: #cbd5e1; }
    .swagger-ui .dialog-ux .modal-ux { background: #1e293b; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .swagger-ui .dialog-ux .modal-ux-header h3 { color: #f1f5f9; }
    .swagger-ui .dialog-ux .modal-ux-content h4 { color: #cbd5e1; }
    .swagger-ui .dialog-ux .modal-ux-content p { color: #94a3b8; }
    .swagger-ui select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; }
    .swagger-ui .tab li { color: #94a3b8; }
    .swagger-ui .tab li.active { color: #38bdf8; }
    .swagger-ui .loading-container { color: #94a3b8; }
    .swagger-ui .loading-container .loading { background: #1e293b; border-color: #334155; }
    .swagger-ui .errors-wrapper { background: #3b1f1f; border-color: #f87171; }
    .swagger-ui .errors-wrapper hgroup { background: #3b1f1f; }
    .swagger-ui .global-server-container { background: #1e293b; }
    .swagger-ui .servers label { color: #94a3b8; }
    .swagger-ui .servers select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; }
    .swagger-ui .response-control-media-type { color: #94a3b8; }
    .swagger-ui .response-control-media-type__accept-message { color: #4ade80; }
    .swagger-ui .opblock .opblock-summary-path { color: #60a5fa; }
    .swagger-ui .opblock .opblock-summary-path a { color: #60a5fa; }
    .swagger-ui .opblock .opblock-summary-description { color: #94a3b8; }
    .swagger-ui .opblock-description-wrapper p { color: #cbd5e1; }
    .swagger-ui .opblock .opblock-section-header { background: #1e293b; border-bottom: 1px solid #334155; }
    .swagger-ui .opblock .opblock-section-header h4 { color: #f1f5f9; }
    .swagger-ui .opblock .opblock-section-header label { color: #94a3b8; }
    .swagger-ui .opblock-body .opblock-body pre { background: #0f172a; }
    .swagger-ui .opblock-body .parameter__name.required:after { color: #f87171; }
    .swagger-ui .opblock-body .parameter__extension, .swagger-ui .opblock-body .parameter__in { color: #64748b; }
    .swagger-ui .response-col_description__inner div.markdown p { color: #cbd5e1; }
    .swagger-ui .responses-inner h4, .swagger-ui .responses-inner h5, .swagger-ui .responses-inner .response-col_status { color: #cbd5e1; }
    .swagger-ui .model-container { background: #1e293b; border-radius: 6px; }
    .swagger-ui .model-container .models-control, .swagger-ui .model-container .model-box-control { border-radius: 6px; }
    .swagger-ui .model-container .model-box-control:focus, .swagger-ui .model-container .models-control:focus { background: #1e293b; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
  <script>
    SwaggerUIBundle({
      url: "/docs/openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIBundle.SwaggerUIStandalonePreset
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl
      ],
      layout: "StandaloneLayout",
      defaultModelsExpandDepth: -1,
      docExpansion: "list",
      filter: true,
      showExtensions: true,
      showCommonExtensions: true,
      tryItOutEnabled: true,
      supportedSubmitMethods: ["get", "post", "put", "delete"],
    });
  </script>
</body>
</html>
