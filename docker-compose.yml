version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: amigable-cobro-db
    restart: unless-stopped
    env_file:
      - ./amigable-cobro-api/.env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-amigable_cobro}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - amigable-network
    ports:
      - "3312:3306"

  app:
    build:
      context: ./amigable-cobro-api
      dockerfile: Dockerfile
    image: amigable-cobro-api
    container_name: amigable-cobro-app
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - ./amigable-cobro-api/.env
    volumes:
      - ./amigable-cobro-api:/var/www
    networks:
      - amigable-network
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: php artisan serve --host=0.0.0.0 --port=8000

  front:
    build:
      context: ./amigable-cobro-front
      dockerfile: Dockerfile
    image: amigable-cobro-front
    container_name: amigable-cobro-front
    restart: unless-stopped
    working_dir: /usr/src/app
    volumes:
      - ./amigable-cobro-front:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - amigable-network
    depends_on:
      - app
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - BACKEND_URL=http://app:8000
      - NODE_ENV=development
    command: npm run dev:server

networks:
  amigable-network:
    driver: bridge

volumes:
  db-data:
    driver: local
